<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nihongo Master | Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #0d0d12; margin: 0;">

  <div id="admin-login-box" style="background: #1a1a24; padding: 40px; border-radius: 12px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333;">
    <h1 style="color: #ffcc00; margin-bottom: 10px;">Admin Gateway</h1>
    <p style="color: #aaa; margin-bottom: 30px;">Authenticate with Firebase Admin Email.</p>
    
    <input type="email" id="admin-email" placeholder="Admin Email" style="width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #0d0d12; color: white; box-sizing: border-box;">
    <input type="password" id="admin-password" placeholder="Admin Password" style="width: 100%; padding: 15px; margin-bottom: 25px; border-radius: 8px; border: 1px solid #333; background: #0d0d12; color: white; box-sizing: border-box;">
    
    <button id="admin-login-btn" class="primary-btn" style="background: #ffcc00; color: #000; width: 100%;">Authenticate</button>
    <br><br>
    <a href="index.html" style="color: #00d2ff; text-decoration: none; font-size: 0.9rem;">Return to Academy</a>
  </div>

  <div id="admin-dashboard" class="hidden" style="width: 100%; max-width: 1200px; padding: 40px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1 style="color: #00d2ff;">Admin Control Center</h1>
        <button id="admin-logout-btn" class="secondary-btn">Sign Out</button>
    </div>

    <div style="display: flex; gap: 20px; margin-bottom: 20px;">
        <div style="background: #1a1a24; padding: 20px; border-radius: 10px; border: 1px solid #333; flex: 1;">
            <span style="color: #aaa; font-size: 1.2rem;">Total Students: </span>
            <span id="total-users" style="color: #00d2ff; font-weight: bold; font-size: 1.5rem;">0</span>
        </div>
        <div style="background: #1a1a24; padding: 20px; border-radius: 10px; border: 1px solid #333; flex: 1;">
            <span style="color: #aaa; font-size: 1.2rem;">Pro Members: </span>
            <span id="pro-users" style="color: #ffcc00; font-weight: bold; font-size: 1.5rem;">0</span>
        </div>
    </div>

    <table style="width: 100%; border-collapse: collapse; background: #1a1a24; border-radius: 12px; overflow: hidden;">
        <thead>
            <tr style="background: #00d2ff; color: #000;">
                <th style="padding: 15px; text-align: left;">Student</th>
                <th style="padding: 15px; text-align: left;">Progress</th>
                <th style="padding: 15px; text-align: left;">Tier</th>
                <th style="padding: 15px; text-align: left;">Actions</th>
            </tr>
        </thead>
        <tbody id="user-list"></tbody>
    </table>
  </div>

  <script type="module" src="admim.js"></script>
</body>
</html>
