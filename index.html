<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nihongo Master | Portal</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212;">

  <div id="login-container" style="background: #1a1a24; border: 2px solid #333; border-radius: 20px; padding: 40px 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: fadeIn 0.3s ease;">
    
    <h1 style="color: #00d2ff; font-size: 2.5rem; margin-bottom: 10px;">日本語 Master</h1>
    <h3 style="color: #fff; margin-bottom: 25px; font-weight: normal;">Log in to continue your training</h3>

    <input type="email" id="login-email" placeholder="Enter your Email" class="auth-input">
    <input type="password" id="login-password" placeholder="Enter your Password" class="auth-input">

    <div id="login-error-msg" style="color: #ff3366; margin-bottom: 15px; font-weight: bold; min-height: 20px;"></div>

    <button class="auth-btn" onclick="loginFunction()">Welcome Back</button>

    <div style="margin-top: 25px;">
      <span style="color: #aaa;">Need an account?</span> 
      <a href="#" onclick="toggleAuthMode('register')" class="auth-link">Register here</a>
    </div>

    <div style="margin-top: 15px;">
      <a href="admin.html" style="color: #555; text-decoration: none; font-size: 0.8rem; transition: color 0.2s;">🔒 Admin Portal</a>
    </div>
  </div>

  <div id="register-container" class="hidden" style="background: #1a1a24; border: 2px solid #333; border-radius: 20px; padding: 40px 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: fadeIn 0.3s ease;">
    
    <h1 style="color: #00d2ff; font-size: 2.5rem; margin-bottom: 10px;">日本語 Master</h1>
    <h3 style="color: #fff; margin-bottom: 25px; font-weight: normal;">Register to begin your journey</h3>

    <input type="text" id="reg-username" placeholder="Choose a Username" class="auth-input">
    <input type="email" id="reg-email" placeholder="Enter your Email" class="auth-input">
    <input type="password" id="reg-password" placeholder="Create a Password" class="auth-input">
    <input type="password" id="reg-confirm" placeholder="Confirm Password" class="auth-input">

    <div id="reg-error-msg" style="color: #ff3366; margin-bottom: 15px; font-weight: bold; min-height: 20px;"></div>

    <button class="auth-btn" onclick="registerFunction()">Begin Journey</button>

    <div style="margin-top: 25px;">
      <span style="color: #aaa;">Already a student?</span> 
      <a href="#" onclick="toggleAuthMode('login')" class="auth-link">Welcome back</a>
    </div>

    <div style="margin-top: 15px;">
      <a href="admin.html" style="color: #555; text-decoration: none; font-size: 0.8rem; transition: color 0.2s;">🔒 Admin Portal</a>
    </div>
  </div>

  <script>
    // --- THE INSTANT SWAP ENGINE ---
    function toggleAuthMode(mode) {
      const loginBox = document.getElementById('login-container');
      const regBox = document.getElementById('register-container');
      
      // Clear any old error messages when flipping pages
      document.getElementById('login-error-msg').textContent = '';
      document.getElementById('reg-error-msg').textContent = '';

      if (mode === 'register') {
        loginBox.classList.add('hidden');
        regBox.classList.remove('hidden');
      } else {
        regBox.classList.add('hidden');
        loginBox.classList.remove('hidden');
      }
    }

    // --- LOGIN LOGIC ---
    function loginFunction() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorMsg = document.getElementById('login-error-msg');

      if (email.trim() === '' || password.trim() === '') {
        errorMsg.textContent = "Please enter your email and password.";
        return;
      }
      
      const username = email.split('@')[0];
      localStorage.setItem('nihongoStudent', username);
      window.location.href = 'courses.html';
    }

    // --- REGISTER LOGIC ---
    function registerFunction() {
      const username = document.getElementById('reg-username').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pass1 = document.getElementById('reg-password').value;
      const pass2 = document.getElementById('reg-confirm').value;
      const errorMsg = document.getElementById('reg-error-msg');

      if (!username || !email || !pass1) {
        errorMsg.textContent = "Please fill out all fields.";
        return;
      }

      if (pass1 !== pass2) {
        errorMsg.textContent = "Passwords do not match!";
        return;
      }

      let users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
      
      if (users.find(u => u.username === username)) {
         errorMsg.textContent = "Username is already taken!";
         return;
      }

      users.push({ username: username, email: email, role: 'student' });
      localStorage.setItem('registeredUsers', JSON.stringify(users));

      localStorage.setItem('nihongoStudent', username);
      window.location.href = 'courses.html';
    }
  </script>
</body>
</html>
